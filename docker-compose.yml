services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-apex_db}
      POSTGRES_USER: ${POSTGRES_USER:-apex_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apex_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apex_user} -d ${POSTGRES_DB:-apex_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-apex_user}:${POSTGRES_PASSWORD:-apex_pass}@db:5432/${POSTGRES_DB:-apex_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      SUPERUSER_EMAIL: ${SUPERUSER_EMAIL:-admin@apexbrasil.com}
      SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD:-}
      EMPLOYEE_DEFAULT_PASSWORD: ${EMPLOYEE_DEFAULT_PASSWORD:-Apex@2024}

volumes:
  pgdata:
